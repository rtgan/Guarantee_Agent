<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AutoQA Form Fixture</title>
  <style>
    body { font-family: sans-serif; margin: 24px; }
    label { display: block; margin-top: 12px; }
    .spacer { height: 1600px; background: #f5f5f5; margin-top: 24px; padding: 12px; }
    #hiddenBottom { color: #0a0; font-weight: bold; }
    #successMsg { color: #060; font-weight: bold; display: none; }
    #afterWait { color: #006; display: none; }
  </style>
</head>
<body>
  <h1>AutoQA Form Fixture</h1>

  <form id="form" onsubmit="return false;">
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="enter username" />

    <label for="color">Favorite color</label>
    <select id="color">
      <option value="">-- choose --</option>
      <option value="red">Red</option>
      <option value="green">Green</option>
      <option value="blue">Blue</option>
    </select>

    <button id="submitBtn" type="button" onclick="onSubmit()">Submit</button>
  </form>

  <p id="successMsg">Form submitted successfully</p>

  <div class="spacer">Scroll down to see the hidden message.</div>

  <p id="hiddenBottom">You reached the bottom</p>

  <button id="waitBtn" type="button" onclick="onWait()">Show After Wait</button>
  <p id="afterWait">Visible after wait</p>

  <script>
    function onSubmit() {
      var u = document.getElementById('username').value;
      var c = document.getElementById('color').value;
      if (u && c) {
        document.getElementById('successMsg').style.display = 'block';
      }
    }
    function onWait() {
      setTimeout(function () {
        document.getElementById('afterWait').style.display = 'block';
      }, 500);
    }
  </script>
</body>
</html>
