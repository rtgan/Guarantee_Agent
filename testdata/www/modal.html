<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AutoQA Modal</title>
  <style>
    body { font-family: sans-serif; margin: 24px; }
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.4);
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .dialog {
      background: #fff; padding: 20px; border-radius: 6px;
      width: 320px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    h2 { margin-top: 0; }
    #deletedMsg { color: #060; font-weight: bold; display: none; }
    #cancelledMsg { color: #006; font-weight: bold; display: none; }
  </style>
</head>
<body>
  <h1>AutoQA Modal Fixture</h1>

  <button id="openBtn" type="button" onclick="openModal()">Delete item</button>
  <p id="deletedMsg">Item deleted</p>
  <p id="cancelledMsg">Deletion cancelled</p>

  <div id="overlay" class="overlay">
    <div class="dialog" role="dialog" aria-modal="true">
      <h2>Confirm deletion</h2>
      <p>Are you sure you want to delete this item?</p>
      <button id="cancelBtn" type="button" onclick="closeModal()">Cancel</button>
      <button id="confirmBtn" type="button" onclick="confirmDelete()">Confirm</button>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('overlay').classList.add('open');
    }
    function closeModal() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('cancelledMsg').style.display = 'block';
    }
    function confirmDelete() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('deletedMsg').style.display = 'block';
    }
  </script>
</body>
</html>
